<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Select Seats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        .seat-btn {
            width: 42px;
            height: 42px;
            font-size: 0.65rem;
            padding: 2px;
            margin: 2px;
            border-radius: 6px;
            font-weight: 600;
        }
        .seat-AVAILABLE { background-color: #28a745; color: white; border: none; cursor: pointer; }
        .seat-LOCKED    { background-color: #ffc107; color: black; border: none; cursor: not-allowed; }
        .seat-BOOKED    { background-color: #dc3545; color: white; border: none; cursor: not-allowed; }
        .screen {
            background: linear-gradient(to bottom, #888, #ddd);
            height: 20px;
            border-radius: 4px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎟 TicketBooking</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/events}">Events</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <a th:href="@{/events/{id}(id=${show.event?.id})}" class="btn btn-outline-secondary mb-3">&larr; Back to Event</a>

    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2 th:text="${show.event?.title}">Event Title</h2>
            <p class="text-muted mb-1">
                <strong th:text="${show.venue?.name}"></strong> &mdash;
                <span th:text="${show.venue?.city}"></span>
            </p>
            <p class="text-muted">
                <span th:text="${#temporals.format(show.showTime, 'EEE, dd MMM yyyy hh:mm a')}"></span>
            </p>
        </div>
        <div class="text-end">
            <p class="mb-1"><strong>Base Price:</strong>
                <span class="text-success" th:text="${'$' + show.basePrice}"></span>
            </p>
            <p class="mb-0"><small class="text-muted"
                                    th:text="${show.availableSeats + ' seats available'}"></small></p>
        </div>
    </div>

    <!-- Legend -->
    <div class="d-flex gap-3 mb-3">
        <span><button class="seat-btn seat-AVAILABLE" disabled>A1</button> Available</span>
        <span><button class="seat-btn seat-LOCKED" disabled>A1</button> Locked</span>
        <span><button class="seat-btn seat-BOOKED" disabled>A1</button> Booked</span>
    </div>

    <!-- Screen -->
    <div class="screen"></div>
    <p class="text-center text-muted small mb-4">SCREEN</p>

    <!-- Seat Grid -->
    <div th:if="${not #lists.isEmpty(seats)}">
        <!-- Group seats by row -->
        <div th:each="rowNum : ${#numbers.sequence(1, show.venue?.totalRows ?: 1)}" class="d-flex align-items-center mb-1">
            <span class="me-2 fw-bold text-muted" style="width: 20px;"
                  th:text="${#strings.toString(T(java.lang.Character).valueOf((char)('A' + rowNum - 1)))}"></span>
            <div th:each="seat : ${seats}" th:if="${seat.rowNumber == rowNum}">
                <button class="seat-btn"
                        th:classappend="${'seat-' + seat.status}"
                        th:text="${seat.seatLabel}"
                        th:title="${seat.seatLabel + ' - ' + seat.status + ' ($' + seat.price + ')'}"
                        th:disabled="${seat.status.name() != 'AVAILABLE'}"></button>
            </div>
        </div>
    </div>

    <div class="text-center mt-4" th:if="${#lists.isEmpty(seats)}">
        <p class="text-muted">No seat layout available for this show.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
