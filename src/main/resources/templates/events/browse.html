<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Browse Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎟 TicketBooking</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:href="@{/events}">Events</a>
            <a class="nav-link" th:href="@{/admin/venues}">Admin</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">Upcoming Events</h1>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="event : ${events}">
            <div class="card h-100 shadow-sm">
                <img th:src="${event.posterUrl != null ? event.posterUrl : 'https://via.placeholder.com/300x180?text=No+Image'}"
                     class="card-img-top" alt="Event Poster" style="height: 180px; object-fit: cover;"/>
                <div class="card-body">
                    <span class="badge bg-info text-dark mb-2" th:text="${event.eventType}"></span>
                    <h5 class="card-title" th:text="${event.title}"></h5>
                    <p class="card-text text-muted small"
                       th:text="${#strings.abbreviate(event.description, 100)}"></p>
                    <p class="card-text" th:if="${event.durationMins != null}">
                        <small class="text-muted">&#9200; <span th:text="${event.durationMins}"></span> min</small>
                    </p>
                    <p class="card-text" th:if="${event.genre != null}">
                        <small class="text-muted">Genre: <span th:text="${event.genre}"></span></small>
                    </p>
                </div>
                <div class="card-footer">
                    <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-primary w-100">View Shows</a>
                </div>
            </div>
        </div>
    </div>
    <div class="text-center mt-5" th:if="${#lists.isEmpty(events)}">
        <p class="text-muted fs-5">No published events available at the moment.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
