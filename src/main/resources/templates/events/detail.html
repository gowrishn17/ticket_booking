<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${event.title} + ' - Event Details'">Event Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎟 TicketBooking</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/events}">Events</a>
            <a class="nav-link" th:href="@{/admin/venues}">Admin</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <a th:href="@{/events}" class="btn btn-outline-secondary mb-3">&larr; Back to Events</a>

    <div class="row">
        <div class="col-md-4">
            <img th:src="${event.posterUrl != null ? event.posterUrl : 'https://via.placeholder.com/400x300?text=No+Image'}"
                 class="img-fluid rounded shadow" alt="Poster"/>
        </div>
        <div class="col-md-8">
            <span class="badge bg-info text-dark fs-6 mb-2" th:text="${event.eventType}"></span>
            <h1 th:text="${event.title}"></h1>
            <p class="lead" th:text="${event.description}"></p>
            <hr/>
            <ul class="list-unstyled">
                <li th:if="${event.durationMins != null}">
                    <strong>Duration:</strong> <span th:text="${event.durationMins}"></span> minutes
                </li>
                <li th:if="${event.language != null}">
                    <strong>Language:</strong> <span th:text="${event.language}"></span>
                </li>
                <li th:if="${event.genre != null}">
                    <strong>Genre:</strong> <span th:text="${event.genre}"></span>
                </li>
            </ul>
        </div>
    </div>

    <hr class="my-4"/>
    <h3>Upcoming Shows</h3>

    <div class="row mt-3">
        <div class="col-md-4 mb-3" th:each="show : ${upcomingShows}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6 class="card-title" th:text="${show.venue?.name}"></h6>
                    <p class="card-text text-muted small"
                       th:text="${show.venue?.city}"></p>
                    <p class="card-text">
                        <strong th:text="${#temporals.format(show.showTime, 'EEE, dd MMM yyyy')}"></strong>
                        <br/>
                        <span th:text="${#temporals.format(show.showTime, 'hh:mm a')}"></span>
                    </p>
                    <p class="card-text">
                        <span class="text-success fw-bold" th:text="${'$' + show.basePrice}"></span>
                        <span class="text-muted small ms-2"
                              th:text="${show.availableSeats + ' seats left'}"></span>
                    </p>
                    <a th:href="@{/shows/{id}/seats(id=${show.id})}" class="btn btn-success w-100">Select Seats</a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-3" th:if="${#lists.isEmpty(upcomingShows)}">
        <p class="text-muted">No upcoming shows available for this event.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
