<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Event - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Edit Event</h1>
    <form th:action="@{/admin/events/{id}/edit(id=${event.id})}" method="post">
        <input type="hidden" name="id" th:value="${event.id}"/>
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" th:value="${event.title}" required/>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4"
                      th:text="${event.description}"></textarea>
        </div>
        <div class="mb-3">
            <label for="eventType" class="form-label">Event Type</label>
            <select class="form-select" id="eventType" name="eventType" required>
                <option th:each="type : ${eventTypes}"
                        th:value="${type}"
                        th:text="${type}"
                        th:selected="${type == event.eventType}"></option>
            </select>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="durationMins" class="form-label">Duration (minutes)</label>
                <input type="number" class="form-control" id="durationMins" name="durationMins"
                       th:value="${event.durationMins}" min="1"/>
            </div>
            <div class="col-md-4 mb-3">
                <label for="language" class="form-label">Language</label>
                <input type="text" class="form-control" id="language" name="language" th:value="${event.language}"/>
            </div>
            <div class="col-md-4 mb-3">
                <label for="genre" class="form-label">Genre</label>
                <input type="text" class="form-control" id="genre" name="genre" th:value="${event.genre}"/>
            </div>
        </div>
        <div class="mb-3">
            <label for="posterUrl" class="form-label">Poster URL</label>
            <input type="url" class="form-control" id="posterUrl" name="posterUrl" th:value="${event.posterUrl}"/>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Update Event</button>
            <a th:href="@{/admin/events}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
