<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Events - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Events</h1>
        <div>
            <a th:href="@{/admin/analytics}" class="btn btn-outline-secondary me-2">Analytics</a>
            <a th:href="@{/admin/venues}" class="btn btn-outline-secondary me-2">Venues</a>
            <a th:href="@{/admin/shows}" class="btn btn-outline-secondary me-2">Shows</a>
            <a th:href="@{/admin/events/create}" class="btn btn-primary">+ New Event</a>
        </div>
    </div>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Type</th>
            <th>Status</th>
            <th>Duration (min)</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td th:text="${event.id}"></td>
            <td th:text="${event.title}"></td>
            <td>
                <span class="badge bg-info text-dark" th:text="${event.eventType}"></span>
            </td>
            <td>
                <span class="badge"
                      th:classappend="${event.status.name() == 'PUBLISHED'} ? 'bg-success' : (${event.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary')"
                      th:text="${event.status}"></span>
            </td>
            <td th:text="${event.durationMins != null ? event.durationMins : '-'}"></td>
            <td>
                <a th:href="@{/admin/events/{id}/edit(id=${event.id})}" class="btn btn-sm btn-warning me-1">Edit</a>
                <form th:action="@{/admin/events/{id}/publish(id=${event.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-success me-1">Publish</button>
                </form>
                <form th:action="@{/admin/events/{id}/cancel(id=${event.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-secondary me-1">Cancel</button>
                </form>
                <form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this event?')">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(events)}">
            <td colspan="6" class="text-center text-muted">No events found.</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
