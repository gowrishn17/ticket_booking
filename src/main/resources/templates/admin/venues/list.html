<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Venues - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Venues</h1>
        <div>
            <a th:href="@{/admin/analytics}" class="btn btn-outline-secondary me-2">Analytics</a>
            <a th:href="@{/admin/events}" class="btn btn-outline-secondary me-2">Events</a>
            <a th:href="@{/admin/shows}" class="btn btn-outline-secondary me-2">Shows</a>
            <a th:href="@{/admin/venues/create}" class="btn btn-primary">+ New Venue</a>
        </div>
    </div>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
            <th>Rows</th>
            <th>Seats/Row</th>
            <th>Total Capacity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="venue : ${venues}">
            <td th:text="${venue.id}"></td>
            <td th:text="${venue.name}"></td>
            <td th:text="${venue.city}"></td>
            <td th:text="${venue.totalRows}"></td>
            <td th:text="${venue.seatsPerRow}"></td>
            <td th:text="${venue.totalCapacity}"></td>
            <td>
                <a th:href="@{/admin/venues/{id}/edit(id=${venue.id})}" class="btn btn-sm btn-warning me-1">Edit</a>
                <form th:action="@{/admin/venues/{id}/delete(id=${venue.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this venue?')">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(venues)}">
            <td colspan="7" class="text-center text-muted">No venues found.</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
