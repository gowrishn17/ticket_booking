<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Venue - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Create Venue</h1>
    <form th:action="@{/admin/venues/create}" th:object="${venue}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required/>
        </div>
        <div class="mb-3">
            <label for="city" class="form-label">City</label>
            <input type="text" class="form-control" id="city" th:field="*{city}" required/>
        </div>
        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" th:field="*{address}" rows="3"></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="totalRows" class="form-label">Total Rows</label>
                <input type="number" class="form-control" id="totalRows" th:field="*{totalRows}" min="1" required/>
            </div>
            <div class="col-md-6 mb-3">
                <label for="seatsPerRow" class="form-label">Seats Per Row</label>
                <input type="number" class="form-control" id="seatsPerRow" th:field="*{seatsPerRow}" min="1" required/>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Create Venue</button>
            <a th:href="@{/admin/venues}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
