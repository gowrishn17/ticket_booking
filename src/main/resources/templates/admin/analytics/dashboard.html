<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Analytics Dashboard - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Analytics Dashboard</h1>
        <div>
            <a th:href="@{/admin/venues}" class="btn btn-outline-secondary me-2">Venues</a>
            <a th:href="@{/admin/events}" class="btn btn-outline-secondary me-2">Events</a>
            <a th:href="@{/admin/shows}" class="btn btn-outline-secondary">Shows</a>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Bookings</h5>
                    <p class="card-text display-6" th:text="${analytics.totalBookings}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Events</h5>
                    <p class="card-text display-6" th:text="${analytics.totalEvents}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Shows</h5>
                    <p class="card-text display-6" th:text="${analytics.totalShows}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Venues</h5>
                    <p class="card-text display-6" th:text="${analytics.totalVenues}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Revenue per Event -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Revenue per Event</h5></div>
                <div class="card-body">
                    <table class="table table-sm">
                        <thead><tr><th>Event</th><th>Revenue ($)</th></tr></thead>
                        <tbody>
                        <tr th:each="row : ${analytics.revenuePerEvent}">
                            <td th:text="${row[0]}"></td>
                            <td th:text="${#numbers.formatDecimal(row[1], 1, 2)}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(analytics.revenuePerEvent)}">
                            <td colspan="2" class="text-center text-muted">No data yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Popular Events -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Popular Events (by Bookings)</h5></div>
                <div class="card-body">
                    <table class="table table-sm">
                        <thead><tr><th>Event</th><th>Bookings</th></tr></thead>
                        <tbody>
                        <tr th:each="row : ${analytics.bookingCountPerEvent}">
                            <td th:text="${row[0]}"></td>
                            <td th:text="${row[1]}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(analytics.bookingCountPerEvent)}">
                            <td colspan="2" class="text-center text-muted">No data yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
