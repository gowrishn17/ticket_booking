<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Show - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Edit Show</h1>
    <form th:action="@{/admin/shows/{id}/edit(id=${show.id})}" method="post">
        <div class="mb-3">
            <label for="eventId" class="form-label">Event</label>
            <select class="form-select" id="eventId" name="eventId" required>
                <option value="">-- Select Event --</option>
                <option th:each="event : ${events}"
                        th:value="${event.id}"
                        th:text="${event.title}"
                        th:selected="${event.id == show.event?.id}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="venueId" class="form-label">Venue</label>
            <select class="form-select" id="venueId" name="venueId" required>
                <option value="">-- Select Venue --</option>
                <option th:each="venue : ${venues}"
                        th:value="${venue.id}"
                        th:text="${venue.name + ' (' + venue.city + ')'}"
                        th:selected="${venue.id == show.venue?.id}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="showTime" class="form-label">Show Time</label>
            <input type="datetime-local" class="form-control" id="showTime" name="showTime"
                   th:value="${#temporals.format(show.showTime, 'yyyy-MM-dd''T''HH:mm')}" required/>
        </div>
        <div class="mb-3">
            <label for="basePrice" class="form-label">Base Price ($)</label>
            <input type="number" class="form-control" id="basePrice" name="basePrice"
                   th:value="${show.basePrice}" step="0.01" min="0" required/>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Update Show</button>
            <a th:href="@{/admin/shows}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
