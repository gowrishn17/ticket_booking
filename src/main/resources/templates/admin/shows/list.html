<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shows - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Shows</h1>
        <div>
            <a th:href="@{/admin/analytics}" class="btn btn-outline-secondary me-2">Analytics</a>
            <a th:href="@{/admin/venues}" class="btn btn-outline-secondary me-2">Venues</a>
            <a th:href="@{/admin/events}" class="btn btn-outline-secondary me-2">Events</a>
            <a th:href="@{/admin/shows/create}" class="btn btn-primary">+ New Show</a>
        </div>
    </div>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Event</th>
            <th>Venue</th>
            <th>Show Time</th>
            <th>Base Price</th>
            <th>Available Seats</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="show : ${shows}">
            <td th:text="${show.id}"></td>
            <td th:text="${show.event?.title}"></td>
            <td th:text="${show.venue?.name}"></td>
            <td th:text="${#temporals.format(show.showTime, 'dd MMM yyyy HH:mm')}"></td>
            <td th:text="${'$' + show.basePrice}"></td>
            <td th:text="${show.availableSeats}"></td>
            <td>
                <a th:href="@{/admin/shows/{id}/edit(id=${show.id})}" class="btn btn-sm btn-warning me-1">Edit</a>
                <form th:action="@{/admin/shows/{id}/delete(id=${show.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this show?')">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(shows)}">
            <td colspan="7" class="text-center text-muted">No shows found.</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
